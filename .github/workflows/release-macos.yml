name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-15
            arch: arm64

    runs-on: ${{ matrix.runner }}
    env:
      APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
      PKG_SIGN_IDENTITY: ${{ secrets.PKG_SIGN_IDENTITY }}
      NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
      NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Import code signing certificates
        if: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' }}
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/webm2webp-cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/webm2webp-cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build macOS app
        run: ./build_macos_app.sh

      - name: Build macOS installer package
        run: ./build_macos_pkg.sh "${GITHUB_REF_NAME#v}"

      - name: Archive app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/WebM2WebP.app dist/WebM2WebP-macos-${{ matrix.arch }}.zip

      - name: Rename installer package
        run: mv dist/WebM2WebP.pkg dist/WebM2WebP-macos-${{ matrix.arch }}.pkg

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/WebM2WebP-macos-${{ matrix.arch }}.zip --clobber
          gh release upload "${GITHUB_REF_NAME}" dist/WebM2WebP-macos-${{ matrix.arch }}.pkg --clobber

      - name: Cleanup temporary keychain
        if: ${{ always() && secrets.APPLE_CERTIFICATE_P12_BASE64 != '' && secrets.KEYCHAIN_PASSWORD != '' }}
        run: security delete-keychain build.keychain || true
